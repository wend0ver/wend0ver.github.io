<input id="url" placeholder="http://10.186.102.85:5000/myMouseAccel/test">
<button id="start">Start Motion Control</button>

<script>
	let acl;
	let accel = {
		x: 0,
		y: 0,
		z: 0
	};

	document.getElementById("start").addEventListener("click", async () => {
		if (typeof DeviceMotionEvent.requestPermission === "function") {
			const permission = await DeviceMotionEvent.requestPermission();

			if (permission !== "granted") {
				alert("click yes");
				return;
			}
		}

		try {
			acl = new Accelerometer({ frequency: 60 });

			acl.addEventListener("reading", () => {
				accel.x = acl.x;
				accel.y = acl.y;
				accel.z = acl.z;

				console.log(accel);
			});

			acl.start();

			setInterval(() => {
				const url = document.getElementById("url").value;

				if (!url || !acl) return;

				fetch(url, {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify(accel)
				}).catch(err => {
					console.log("error:", err);
				});
			}, 17);

			alert("good");

		} catch (e) {
			console.error(e);
			alert("nope: " + e);
		}
	});
</script>
